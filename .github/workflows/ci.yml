
permissions:
  contents: read
  security-events: write
  actions: read

name: DevSecOps CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x]
    env:
      NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY || 'demo-key' }}
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN || 'demo.firebaseapp.com' }}
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID || 'demo-project' }}
      NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET || 'demo.appspot.com' }}
      NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID || '0' }}
      NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID || '0:0:web:0' }}
      NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID || '' }}
      NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL || 'http://localhost:3000' }}
      NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET || 'your-nextauth-secret' }}
      EMAIL_SERVER_USER: ${{ secrets.EMAIL_SERVER_USER || 'your-email@example.com' }}
      EMAIL_SERVER_PASSWORD: ${{ secrets.EMAIL_SERVER_PASSWORD || 'your-email-password' }}
      EMAIL_SERVER_HOST: ${{ secrets.EMAIL_SERVER_HOST || 'smtp.your-email.com' }}
      EMAIL_SERVER_PORT: ${{ secrets.EMAIL_SERVER_PORT || 587 }}
      EMAIL_FROM: ${{ secrets.EMAIL_FROM || 'no-reply@example.com' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
        continue-on-error: false
      
      - name: Run linter
        run: npm run lint --if-present
        continue-on-error: true
      
      - name: Build application
        run: npm run build
        continue-on-error: true
      
      - name: Run tests
        run: npx jest --passWithNoTests --ci --no-coverage 2>/dev/null || true
        continue-on-error: true

  lint-yaml:
    name: Lint YAML Files
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install yamllint
        run: pip install yamllint
      
      - name: Lint kubernetes.yaml
        run: 'yamllint -d "{extends: default, rules: {line-length: {max: 120}, comments: disable}}" kubernetes.yaml'

  lint-dockerfile:
    name: Lint Dockerfile
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Run Hadolint on Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          ignore: DL3009,DL3018

  trivy-deps:
    name: Trivy Scan Dependencies
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Run Trivy scan on dependencies
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          exit-code: '0'
          ignore-unfixed: false
          severity: 'HIGH,CRITICAL'
          output: 'trivy-deps-report.txt'
      
      - name: Upload Trivy dependencies report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-deps-report
          path: trivy-deps-report.txt

  trivy-image:
    name: Build and Scan Docker Image
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY || 'demo-key' }}
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN || 'demo-auth-domain' }}
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID || 'demo-project-id' }}
      NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET || 'demo-storage-bucket' }}
      NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID || 'demo-messaging-sender-id' }}
      NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID || 'demo-app-id' }}
      NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID || 'demo-measurement-id' }}
      NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL || 'http://localhost:3000' }}
      NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET || 'your-nextauth-secret' }}
      EMAIL_SERVER_USER: ${{ secrets.EMAIL_SERVER_USER || 'demo-user' }}
      EMAIL_SERVER_PASSWORD: ${{ secrets.EMAIL_SERVER_PASSWORD || 'demo-password' }}
      EMAIL_SERVER_HOST: ${{ secrets.EMAIL_SERVER_HOST || 'demo-host' }}
      EMAIL_SERVER_PORT: ${{ secrets.EMAIL_SERVER_PORT || 'demo-port' }}
      EMAIL_FROM: ${{ secrets.EMAIL_FROM || 'demo-from' }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Build Docker image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_FIREBASE_API_KEY="${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY || 'demo-key' }}" \
            --build-arg NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN="${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN || 'demo-auth-domain' }}" \
            --build-arg NEXT_PUBLIC_FIREBASE_PROJECT_ID="${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID || 'demo-project-id' }}" \
            --build-arg NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET="${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET || 'demo-storage-bucket' }}" \
            --build-arg NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID="${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID || 'demo-messaging-sender-id' }}" \
            --build-arg NEXT_PUBLIC_FIREBASE_APP_ID="${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID || 'demo-app-id' }}" \
            --build-arg NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID="${{ secrets.NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID || 'demo-measurement-id' }}" \
            --build-arg NEXTAUTH_URL="${{ secrets.NEXTAUTH_URL || 'http://localhost:3000' }}" \
            --build-arg NEXTAUTH_SECRET="${{ secrets.NEXTAUTH_SECRET || 'your-nextauth-secret' }}" \
            --build-arg EMAIL_SERVER_USER="${{ secrets.EMAIL_SERVER_USER || 'demo-user' }}" \
            --build-arg EMAIL_SERVER_PASSWORD="${{ secrets.EMAIL_SERVER_PASSWORD || 'demo-password' }}" \
            --build-arg EMAIL_SERVER_HOST="${{ secrets.EMAIL_SERVER_HOST || 'demo-host' }}" \
            --build-arg EMAIL_SERVER_PORT="${{ secrets.EMAIL_SERVER_PORT || 'demo-port' }}" \
            --build-arg EMAIL_FROM="${{ secrets.EMAIL_FROM || 'demo-from' }}" \
            -t pokemon-app:latest .
      
      - name: Run Trivy scan on Docker image
        uses: aquasecurity/trivy-action@0.28.0
        continue-on-error: true
        with:
          image-ref: pokemon-app:latest
          format: sarif
          output: trivy-image-report.sarif
          severity: HIGH,CRITICAL
          exit-code: '0'
      
      - name: Upload Trivy image report to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'trivy-image-report.sarif'
          category: 'trivy-image'
      
      - name: Upload Trivy image report as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-image-report
          path: trivy-image-report.sarif

  conftest:
    name: Conftest Policy Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install Conftest
        run: |
          wget -q https://github.com/open-policy-agent/conftest/releases/download/v0.67.1/conftest_0.67.1_Linux_x86_64.tar.gz
          tar -xzf conftest_0.67.1_Linux_x86_64.tar.gz
          sudo mv conftest /usr/local/bin/
          conftest --version
      
      - name: Run Conftest policy check
        run: |
          conftest test kubernetes.yaml -p policy/ -o json > conftest-report.json
        continue-on-error: true
        # Volontairement en échec - prouve que la règle fonctionne
      
      - name: Upload Conftest report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: conftest-report
          path: conftest-report.json
